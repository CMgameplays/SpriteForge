<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpriteForge — CMG Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #08090f;
      --surface:     #0e1018;
      --surface2:    #13151f;
      --surface3:    #191c28;
      --border:      #1c1f30;
      --border-hi:   #2c3050;
      --text:        #c8d0e8;
      --text-dim:    #4e5570;
      --text-bright: #e6eeff;
      --font-ui:     'Rajdhani', 'Segoe UI', system-ui, sans-serif;
      --font-mono:   'Share Tech Mono', 'Consolas', monospace;
      --accent:      #a855f7;
      --accent-20:   rgba(168,85,247,0.20);
      --accent-08:   rgba(168,85,247,0.08);
      --accent-glow: rgba(168,85,247,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────── */
    .header {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .logo {
      width: 36px;
      height: 36px;
      border: 2px solid var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header h1 {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 1.35rem;
      color: var(--text-bright);
      letter-spacing: 1px;
    }

    .version-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }

    .cmg-badge {
      margin-left: auto;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ── App body ─────────────────────────────────────────── */
    .app-body {
      display: flex;
      height: calc(100vh - 52px);
      overflow: hidden;
    }

    /* ── Controls panel ───────────────────────────────────── */
    .controls-panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 0;
    }

    .controls-panel::-webkit-scrollbar { width: 4px; }
    .controls-panel::-webkit-scrollbar-track { background: transparent; }
    .controls-panel::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* ── Drop zone ────────────────────────────────────────── */
    .dropzone {
      position: relative;
      border: 1.5px dashed var(--border-hi);
      border-radius: 6px;
      padding: 28px 16px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .dropzone:hover {
      border-color: var(--accent);
      background: var(--accent-08);
    }

    .dropzone.drag-over {
      border-color: var(--accent);
      background: var(--accent-08);
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      color: var(--accent);
      margin-bottom: 8px;
      opacity: 0.7;
    }

    .drop-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.3px;
    }

    .drop-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ── File list ────────────────────────────────────────── */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 10px;
      max-height: 190px;
      overflow-y: auto;
    }

    .file-list:empty { display: none; }

    .file-list::-webkit-scrollbar { width: 3px; }
    .file-list::-webkit-scrollbar-track { background: transparent; }
    .file-list::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 0;
    }

    .file-thumb {
      width: 20px;
      height: 20px;
      border-radius: 2px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface3);
    }

    .file-name {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .file-remove {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0 2px;
      font-size: 15px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.1s;
      display: flex;
      align-items: center;
    }

    .file-remove:hover { color: #f87171; }

    /* ── Section separator ────────────────────────────────── */
    .sec {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      font-family: var(--font-ui);
      margin: 20px 0 14px;
      flex-shrink: 0;
    }

    .sec-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Field ────────────────────────────────────────────── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      font-family: var(--font-ui);
      text-transform: uppercase;
    }

    .field-input {
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      border-radius: 4px;
      padding: 7px 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .field-input:focus { border-color: var(--accent); }
    .field-input::-webkit-inner-spin-button,
    .field-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* ── Segmented control ────────────────────────────────── */
    .seg-group {
      display: flex;
      border: 1px solid var(--border-hi);
      border-radius: 4px;
      overflow: hidden;
    }

    .seg-btn {
      flex: 1;
      padding: 7px 10px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .seg-btn + .seg-btn {
      border-left: 1px solid var(--border-hi);
    }

    .seg-btn:hover:not(.active) {
      color: var(--text);
      background: var(--surface3);
    }

    .seg-btn.active {
      color: var(--accent);
      background: var(--accent-08);
    }

    /* ── Pack button ──────────────────────────────────────── */
    .btn-main {
      width: 100%;
      padding: 11px;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: box-shadow 0.2s, background 0.2s;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .btn-main:hover:not(:disabled) {
      box-shadow: 0 0 18px var(--accent-glow);
      background: var(--accent-08);
    }

    .btn-main:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Export row ───────────────────────────────────────── */
    .export-row {
      display: none;
      gap: 8px;
      margin-top: 12px;
      flex-shrink: 0;
    }

    .btn-export {
      flex: 1;
      padding: 8px 6px;
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-export:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Preview panel ────────────────────────────────────── */
    .preview-panel {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    /* ── Empty state ──────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      color: var(--text-dim);
      user-select: none;
    }

    .empty-state svg { opacity: 0.18; }

    .empty-state p {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .empty-sub {
      font-size: 12px !important;
      color: var(--text-dim);
      opacity: 0.6;
      margin-top: -6px;
    }

    /* ── Result wrap ──────────────────────────────────────── */
    .result-wrap {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .results-bar {
      flex-shrink: 0;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .results-bar .info {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .results-bar .info span {
      color: var(--text);
    }

    /* ── Canvas scroll area ───────────────────────────────── */
    .canvas-scroll {
      flex: 1;
      overflow: auto;
      padding: 28px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .canvas-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .canvas-scroll::-webkit-scrollbar-track { background: transparent; }
    .canvas-scroll::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

    .canvas-wrap {
      display: inline-block;
      border: 1px solid var(--border);
      /* Checkerboard for transparency */
      background-color: #0d0d12;
      background-image:
        linear-gradient(45deg, #16161f 25%, transparent 25%),
        linear-gradient(-45deg, #16161f 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #16161f 75%),
        linear-gradient(-45deg, transparent 75%, #16161f 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    }

    #spriteCanvas { display: block; }

    /* ── Error state ──────────────────────────────────────── */
    .error-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
    }

    .error-msg {
      font-family: var(--font-mono);
      font-size: 13px;
      color: #f87171;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 4px;
      padding: 12px 20px;
      max-width: 500px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="1" y="1" width="8" height="8" rx="1" fill="var(--accent)" opacity="0.95"/>
        <rect x="11" y="1" width="8" height="8" rx="1" fill="var(--accent)" opacity="0.55"/>
        <rect x="1" y="11" width="8" height="8" rx="1" fill="var(--accent)" opacity="0.55"/>
        <rect x="11" y="11" width="8" height="8" rx="1" fill="var(--accent)" opacity="0.25"/>
      </svg>
    </div>
    <h1>SpriteForge</h1>
    <span class="version-badge">v1.0.0</span>
    <span class="cmg-badge">CMG Forge</span>
  </header>

  <!-- ── App body ────────────────────────────────────────── -->
  <div class="app-body">

    <!-- ── Controls panel ──────────────────────────────────── -->
    <aside class="controls-panel">

      <!-- Drop zone -->
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*" multiple />
        <div class="drop-icon">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
        </div>
        <div class="drop-title">Drop sprites here</div>
        <div class="drop-sub">or click to browse — any image format</div>
      </div>

      <!-- File list -->
      <div class="file-list" id="fileList"></div>

      <!-- Settings section -->
      <div class="sec"><span>Settings</span><span class="sec-line"></span></div>

      <div class="field">
        <label class="field-label" for="paddingInput">Padding (px)</label>
        <input class="field-input" type="number" id="paddingInput" min="0" max="16" value="2" />
      </div>

      <div class="field">
        <label class="field-label">Sort Order</label>
        <div class="seg-group">
          <button class="seg-btn active" data-sort="size">By Size</button>
          <button class="seg-btn" data-sort="name">By Name</button>
        </div>
      </div>

      <!-- Pack button -->
      <button class="btn-main" id="packBtn" disabled>Pack Sprites</button>

      <!-- Export row (hidden until result) -->
      <div class="export-row" id="exportRow">
        <button class="btn-export" id="dlPng">&#8659; PNG</button>
        <button class="btn-export" id="dlJson">&#8659; JSON</button>
      </div>

    </aside>

    <!-- ── Preview panel ──────────────────────────────────── -->
    <div class="preview-panel">

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
          <rect x="4" y="4" width="28" height="28" rx="2" stroke="var(--text-dim)" stroke-width="1.5"/>
          <rect x="40" y="4" width="28" height="28" rx="2" stroke="var(--text-dim)" stroke-width="1.5"/>
          <rect x="4" y="40" width="28" height="28" rx="2" stroke="var(--text-dim)" stroke-width="1.5"/>
          <rect x="40" y="40" width="28" height="28" rx="2" stroke="var(--text-dim)" stroke-width="1.5"/>
          <line x1="36" y1="4" x2="36" y2="68" stroke="var(--text-dim)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
          <line x1="4" y1="36" x2="68" y2="36" stroke="var(--text-dim)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
        </svg>
        <p>Upload sprites and click Pack</p>
        <p class="empty-sub">Your sprite sheet will appear here</p>
      </div>

      <!-- Error state -->
      <div class="error-state" id="errorState">
        <div class="error-msg" id="errorMsg"></div>
      </div>

      <!-- Result -->
      <div class="result-wrap" id="resultWrap">
        <div class="results-bar">
          <div class="info" id="resultsInfo"></div>
        </div>
        <div class="canvas-scroll">
          <div class="canvas-wrap">
            <canvas id="spriteCanvas"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────
    let files = [];
    let lastResult = null;
    let sortMode = 'size';
    let isPacking = false;

    // ── DOM refs ─────────────────────────────────────────────
    const dropzone    = document.getElementById('dropzone');
    const fileInput   = document.getElementById('fileInput');
    const fileList    = document.getElementById('fileList');
    const paddingInput = document.getElementById('paddingInput');
    const packBtn     = document.getElementById('packBtn');
    const exportRow   = document.getElementById('exportRow');
    const emptyState  = document.getElementById('emptyState');
    const errorState  = document.getElementById('errorState');
    const errorMsg    = document.getElementById('errorMsg');
    const resultWrap  = document.getElementById('resultWrap');
    const canvas      = document.getElementById('spriteCanvas');
    const resultsInfo = document.getElementById('resultsInfo');

    // ── Drop zone ─────────────────────────────────────────────
    dropzone.addEventListener('dragover', e => {
      e.preventDefault();
      dropzone.classList.add('drag-over');
    });

    dropzone.addEventListener('dragleave', e => {
      if (!dropzone.contains(e.relatedTarget)) {
        dropzone.classList.remove('drag-over');
      }
    });

    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      addFiles(Array.from(e.dataTransfer.files));
    });

    fileInput.addEventListener('change', () => {
      addFiles(Array.from(fileInput.files));
      fileInput.value = '';
    });

    // ── File management ───────────────────────────────────────
    function addFiles(newFiles) {
      const images = newFiles.filter(f => f.type.startsWith('image/'));
      images.forEach(f => {
        if (!files.some(existing => existing.name === f.name && existing.size === f.size)) {
          files.push(f);
        }
      });
      renderFileList();
      updatePackBtn();
    }

    function removeFile(idx) {
      files.splice(idx, 1);
      renderFileList();
      updatePackBtn();
    }

    function renderFileList() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'file-item';

        const thumb = document.createElement('img');
        thumb.className = 'file-thumb';
        thumb.src = URL.createObjectURL(f);
        thumb.onload = () => URL.revokeObjectURL(thumb.src);

        const name = document.createElement('span');
        name.className = 'file-name';
        name.title = esc(f.name);
        name.textContent = f.name;

        const btn = document.createElement('button');
        btn.className = 'file-remove';
        btn.title = 'Remove';
        btn.innerHTML = '&times;';
        btn.addEventListener('click', () => removeFile(i));

        item.append(thumb, name, btn);
        fileList.appendChild(item);
      });
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function updatePackBtn() {
      packBtn.disabled = files.length === 0 || isPacking;
    }

    // ── Sort control ─────────────────────────────────────────
    document.querySelectorAll('.seg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        sortMode = btn.dataset.sort;
      });
    });

    // ── Pack ──────────────────────────────────────────────────
    packBtn.addEventListener('click', packSprites);

    async function packSprites() {
      if (files.length === 0 || isPacking) return;

      isPacking = true;
      packBtn.textContent = 'Packing…';
      updatePackBtn();

      try {
        const fd = new FormData();
        files.forEach(f => fd.append('images[]', f));
        fd.append('padding', paddingInput.value);
        fd.append('sort', sortMode);

        const res = await fetch('api/pack', { method: 'POST', body: fd });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${res.status}`);
        }
        const data = await res.json();

        lastResult = data;
        showResult(data);
        exportRow.style.display = 'flex';

      } catch (err) {
        showError(err.message);
      } finally {
        isPacking = false;
        packBtn.textContent = 'Pack Sprites';
        updatePackBtn();
      }
    }

    // ── Render result ─────────────────────────────────────────
    const PALETTE = [
      '#f43f5e','#fb923c','#facc15','#4ade80',
      '#38bdf8','#818cf8','#e879f9','#fb7185',
      '#a78bfa','#34d399','#f97316','#60a5fa',
    ];

    function showResult(data) {
      emptyState.style.display  = 'none';
      errorState.style.display  = 'none';
      resultWrap.style.display  = 'flex';

      const img = new Image();
      img.onload = () => {
        canvas.width  = data.sheet_w;
        canvas.height = data.sheet_h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        data.frames.forEach((f, i) => {
          ctx.strokeStyle = PALETTE[i % PALETTE.length];
          ctx.lineWidth = 1;
          ctx.strokeRect(f.x + 0.5, f.y + 0.5, f.w - 1, f.h - 1);
        });
      };
      img.src = 'data:image/png;base64,' + data.sheet_png;

      const fc = data.frames.length;
      resultsInfo.innerHTML =
        `<span>${data.sheet_w} &times; ${data.sheet_h} px</span>` +
        `&nbsp;&nbsp;&bull;&nbsp;&nbsp;` +
        `<span>${fc} frame${fc !== 1 ? 's' : ''}</span>`;
    }

    function showError(msg) {
      emptyState.style.display  = 'none';
      resultWrap.style.display  = 'none';
      errorState.style.display  = 'flex';
      errorMsg.textContent = 'Error: ' + msg;
    }

    // ── Downloads ─────────────────────────────────────────────
    document.getElementById('dlPng').addEventListener('click', () => {
      if (!lastResult) return;
      const a = document.createElement('a');
      a.href = 'data:image/png;base64,' + lastResult.sheet_png;
      a.download = 'spritesheet.png';
      a.click();
    });

    document.getElementById('dlJson').addEventListener('click', () => {
      if (!lastResult) return;
      const payload = {
        sheet_w: lastResult.sheet_w,
        sheet_h: lastResult.sheet_h,
        frames: lastResult.frames,
      };
      const blob = new Blob(
        [JSON.stringify(payload, null, 2)],
        { type: 'application/json' }
      );
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'spritesheet.json';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
