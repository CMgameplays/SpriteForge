<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpriteForge — CMG Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --forge-bg:       #08090f;
      --forge-surface:  #0f1120;
      --forge-purple:   #a855f7;
      --forge-indigo:   #6366f1;
      --forge-ember:    #f97316;
      --forge-text:     #f1f5f9;
      --forge-muted:    #64748b;
      --forge-green:    #22c55e;
      --forge-red:      #f87171;
      --clip:    polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      --clip-sm: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--forge-bg);
      color: var(--forge-text);
      font-family: 'Rajdhani', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ──────────────────────────────────────── */
    .navbar {
      height: 52px;
      flex-shrink: 0;
      background: var(--forge-bg);
      border-bottom: 1px solid rgba(99, 102, 241, 0.18);
      display: flex;
      align-items: center;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-mark {
      width: 30px;
      height: 30px;
      background: var(--forge-surface);
      border: 1px solid rgba(99, 102, 241, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      clip-path: var(--clip-sm);
      flex-shrink: 0;
    }

    .nav-wordmark {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 3px;
      color: var(--forge-text);
      text-transform: uppercase;
    }

    .nav-sep {
      width: 1px;
      height: 18px;
      background: rgba(99, 102, 241, 0.25);
      margin: 0 14px;
      flex-shrink: 0;
    }

    .nav-tool {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--forge-muted);
      letter-spacing: 1px;
    }

    .nav-spacer { flex: 1; }

    .nav-link {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--forge-muted);
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .nav-link:hover {
      color: var(--forge-text);
      border-color: rgba(99, 102, 241, 0.3);
    }

    /* ── App body ─────────────────────────────────────── */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Controls panel ───────────────────────────────── */
    .controls-panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--forge-surface);
      border-right: 1px solid rgba(99, 102, 241, 0.15);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    .controls-panel::-webkit-scrollbar { width: 3px; }
    .controls-panel::-webkit-scrollbar-track { background: transparent; }
    .controls-panel::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); }

    /* ── Drop zone ────────────────────────────────────── */
    .dropzone {
      position: relative;
      border: 1.5px dashed rgba(99, 102, 241, 0.35);
      padding: 28px 16px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
      clip-path: var(--clip);
    }

    .dropzone:hover,
    .dropzone.drag-over {
      border-color: var(--forge-purple);
      background: rgba(168, 85, 247, 0.06);
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      color: var(--forge-purple);
      margin-bottom: 8px;
      opacity: 0.7;
    }

    .drop-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--forge-text);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .drop-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--forge-muted);
      margin-top: 4px;
    }

    /* ── File list ────────────────────────────────────── */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 10px;
      max-height: 190px;
      overflow-y: auto;
    }

    .file-list:empty { display: none; }

    .file-list::-webkit-scrollbar { width: 3px; }
    .file-list::-webkit-scrollbar-track { background: transparent; }
    .file-list::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.15);
      min-width: 0;
    }

    .file-thumb {
      width: 20px;
      height: 20px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--forge-bg);
    }

    .file-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--forge-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .file-remove {
      background: none;
      border: none;
      color: var(--forge-muted);
      cursor: pointer;
      padding: 0 2px;
      font-size: 15px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.1s;
      display: flex;
      align-items: center;
    }

    .file-remove:hover { color: var(--forge-red); }

    /* ── Section label ────────────────────────────────── */
    .sec {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--forge-muted);
      text-transform: uppercase;
      margin: 20px 0 14px;
      flex-shrink: 0;
    }

    .sec-line {
      flex: 1;
      height: 1px;
      background: rgba(99, 102, 241, 0.15);
    }

    /* ── Field ────────────────────────────────────────── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--forge-muted);
      text-transform: uppercase;
    }

    .field-input {
      background: var(--forge-surface);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 0;
      padding: 7px 10px;
      color: var(--forge-text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .field-input:focus { border-color: var(--forge-indigo); }
    .field-input::-webkit-inner-spin-button,
    .field-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* ── Segmented control ────────────────────────────── */
    .seg-group {
      display: flex;
      border: 1px solid rgba(99, 102, 241, 0.3);
      overflow: hidden;
    }

    .seg-btn {
      flex: 1;
      padding: 7px 10px;
      background: none;
      border: none;
      color: var(--forge-muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .seg-btn + .seg-btn {
      border-left: 1px solid rgba(99, 102, 241, 0.3);
    }

    .seg-btn:hover:not(.active) {
      color: var(--forge-text);
      background: rgba(99, 102, 241, 0.08);
    }

    .seg-btn.active {
      color: var(--forge-indigo);
      background: rgba(99, 102, 241, 0.12);
    }

    /* ── Pack button — primary ember ─────────────────── */
    .btn-main {
      width: 100%;
      padding: 11px;
      background: var(--forge-ember);
      border: none;
      color: #07080d;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      clip-path: var(--clip);
      border-radius: 0;
      transition: opacity 0.2s, box-shadow 0.2s;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .btn-main:hover:not(:disabled) {
      box-shadow: 0 0 24px rgba(249, 115, 22, 0.4);
      opacity: 0.9;
    }

    .btn-main:disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    /* ── Export row ───────────────────────────────────── */
    .export-row {
      display: none;
      gap: 8px;
      margin-top: 12px;
      flex-shrink: 0;
    }

    .btn-export {
      flex: 1;
      padding: 8px 6px;
      background: transparent;
      border: 1px solid rgba(99, 102, 241, 0.35);
      color: var(--forge-text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .btn-export:hover {
      border-color: var(--forge-indigo);
      color: var(--forge-indigo);
      background: rgba(99, 102, 241, 0.08);
    }

    /* ── Preview panel ────────────────────────────────── */
    .preview-panel {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--forge-bg);
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      position: relative;
    }

    /* ── Empty state ──────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 14px;
      color: var(--forge-muted);
      user-select: none;
    }

    .empty-state svg { opacity: 0.15; }

    .empty-state p {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .empty-sub {
      font-family: 'Share Tech Mono', monospace !important;
      font-size: 11px !important;
      color: var(--forge-muted);
      opacity: 0.5;
      margin-top: -6px;
      text-transform: none !important;
      letter-spacing: 0 !important;
      font-weight: 400 !important;
    }

    /* ── Result wrap ──────────────────────────────────── */
    .result-wrap {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .results-bar {
      flex-shrink: 0;
      padding: 8px 16px;
      background: var(--forge-surface);
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .results-bar .info {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--forge-muted);
    }

    .results-bar .info span { color: var(--forge-text); }

    /* ── Canvas scroll area ───────────────────────────── */
    .canvas-scroll {
      flex: 1;
      overflow: auto;
      padding: 28px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .canvas-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .canvas-scroll::-webkit-scrollbar-track { background: transparent; }
    .canvas-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 3px; }

    .canvas-wrap {
      display: inline-block;
      border: 1px solid rgba(99, 102, 241, 0.2);
      background-color: #0b0b12;
      background-image:
        linear-gradient(45deg, #14141e 25%, transparent 25%),
        linear-gradient(-45deg, #14141e 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #14141e 75%),
        linear-gradient(-45deg, transparent 75%, #14141e 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    }

    #spriteCanvas { display: block; }

    /* ── Error state ──────────────────────────────────── */
    .error-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
    }

    .error-msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--forge-red);
      background: rgba(248, 113, 113, 0.07);
      border: 1px solid rgba(248, 113, 113, 0.2);
      padding: 12px 20px;
      max-width: 500px;
      text-align: center;
      clip-path: var(--clip);
    }

    /* ── Footer ───────────────────────────────────────── */
    .forge-footer {
      height: 36px;
      flex-shrink: 0;
      background: var(--forge-bg);
      border-top: 1px solid rgba(99, 102, 241, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .forge-footer span,
    .forge-footer a {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--forge-muted);
      text-decoration: none;
      opacity: 0.55;
    }

    .forge-footer a:hover {
      opacity: 1;
      color: var(--forge-text);
    }
  </style>
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────── -->
  <nav class="navbar">
    <a href="https://cmgforge.com" class="nav-brand">
      <div class="nav-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="6" fill="var(--forge-purple)" opacity="0.9"/>
          <rect x="9" y="1" width="6" height="6" fill="var(--forge-indigo)" opacity="0.6"/>
          <rect x="1" y="9" width="6" height="6" fill="var(--forge-indigo)" opacity="0.6"/>
          <rect x="9" y="9" width="6" height="6" fill="var(--forge-purple)" opacity="0.25"/>
        </svg>
      </div>
      <span class="nav-wordmark">CMG Forge</span>
    </a>
    <div class="nav-sep"></div>
    <span class="nav-tool">SpriteForge</span>
    <div class="nav-spacer"></div>
    <a href="https://cmgforge.com/tools" class="nav-link">All Tools</a>
  </nav>

  <!-- ── App body ────────────────────────────────────── -->
  <div class="app-body">

    <!-- Controls panel -->
    <aside class="controls-panel">

      <!-- Drop zone -->
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*" multiple />
        <div class="drop-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
        </div>
        <div class="drop-title">Drop sprites here</div>
        <div class="drop-sub">click to browse — any image format</div>
      </div>

      <!-- File list -->
      <div class="file-list" id="fileList"></div>

      <!-- Settings -->
      <div class="sec"><span>Settings</span><span class="sec-line"></span></div>

      <div class="field">
        <label class="field-label" for="paddingInput">Padding (px)</label>
        <input class="field-input" type="number" id="paddingInput" min="0" max="16" value="2" />
      </div>

      <div class="field">
        <label class="field-label">Sort Order</label>
        <div class="seg-group">
          <button class="seg-btn active" data-sort="size">By Size</button>
          <button class="seg-btn" data-sort="name">By Name</button>
        </div>
      </div>

      <!-- Pack -->
      <button class="btn-main" id="packBtn" disabled>Pack Sprites</button>

      <!-- Export (hidden until result) -->
      <div class="export-row" id="exportRow">
        <button class="btn-export" id="dlPng">&#8659; PNG</button>
        <button class="btn-export" id="dlJson">&#8659; JSON</button>
      </div>

    </aside>

    <!-- Preview panel -->
    <div class="preview-panel">

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
          <rect x="4" y="4" width="28" height="28" rx="0" stroke="var(--forge-muted)" stroke-width="1.5"/>
          <rect x="40" y="4" width="28" height="28" rx="0" stroke="var(--forge-muted)" stroke-width="1.5"/>
          <rect x="4" y="40" width="28" height="28" rx="0" stroke="var(--forge-muted)" stroke-width="1.5"/>
          <rect x="40" y="40" width="28" height="28" rx="0" stroke="var(--forge-muted)" stroke-width="1.5"/>
          <line x1="36" y1="4" x2="36" y2="68" stroke="var(--forge-indigo)" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
          <line x1="4" y1="36" x2="68" y2="36" stroke="var(--forge-indigo)" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
        </svg>
        <p>Upload sprites and click Pack</p>
        <p class="empty-sub">Your sprite sheet will appear here</p>
      </div>

      <!-- Error state -->
      <div class="error-state" id="errorState">
        <div class="error-msg" id="errorMsg"></div>
      </div>

      <!-- Result -->
      <div class="result-wrap" id="resultWrap">
        <div class="results-bar">
          <div class="info" id="resultsInfo"></div>
        </div>
        <div class="canvas-scroll">
          <div class="canvas-wrap">
            <canvas id="spriteCanvas"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Footer ──────────────────────────────────────── -->
  <footer class="forge-footer">
    <span>© CMG Forge — Free, forever.</span>
    <span>·</span>
    <a href="https://cmgforge.com">cmgforge.com</a>
  </footer>

  <script>
    // ── State ────────────────────────────────────────────────
    let files = [];
    let lastResult = null;
    let sortMode = 'size';
    let isPacking = false;

    // ── DOM refs ─────────────────────────────────────────────
    const dropzone    = document.getElementById('dropzone');
    const fileInput   = document.getElementById('fileInput');
    const fileList    = document.getElementById('fileList');
    const paddingInput = document.getElementById('paddingInput');
    const packBtn     = document.getElementById('packBtn');
    const exportRow   = document.getElementById('exportRow');
    const emptyState  = document.getElementById('emptyState');
    const errorState  = document.getElementById('errorState');
    const errorMsg    = document.getElementById('errorMsg');
    const resultWrap  = document.getElementById('resultWrap');
    const canvas      = document.getElementById('spriteCanvas');
    const resultsInfo = document.getElementById('resultsInfo');

    // ── Drop zone ─────────────────────────────────────────────
    dropzone.addEventListener('dragover', e => {
      e.preventDefault();
      dropzone.classList.add('drag-over');
    });

    dropzone.addEventListener('dragleave', e => {
      if (!dropzone.contains(e.relatedTarget)) {
        dropzone.classList.remove('drag-over');
      }
    });

    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      addFiles(Array.from(e.dataTransfer.files));
    });

    fileInput.addEventListener('change', () => {
      addFiles(Array.from(fileInput.files));
      fileInput.value = '';
    });

    // ── File management ───────────────────────────────────────
    function addFiles(newFiles) {
      const images = newFiles.filter(f => f.type.startsWith('image/'));
      images.forEach(f => {
        if (!files.some(existing => existing.name === f.name && existing.size === f.size)) {
          files.push(f);
        }
      });
      renderFileList();
      updatePackBtn();
    }

    function removeFile(idx) {
      files.splice(idx, 1);
      renderFileList();
      updatePackBtn();
    }

    function renderFileList() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'file-item';

        const thumb = document.createElement('img');
        thumb.className = 'file-thumb';
        thumb.src = URL.createObjectURL(f);
        thumb.onload = () => URL.revokeObjectURL(thumb.src);

        const name = document.createElement('span');
        name.className = 'file-name';
        name.title = esc(f.name);
        name.textContent = f.name;

        const btn = document.createElement('button');
        btn.className = 'file-remove';
        btn.title = 'Remove';
        btn.innerHTML = '&times;';
        btn.addEventListener('click', () => removeFile(i));

        item.append(thumb, name, btn);
        fileList.appendChild(item);
      });
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function updatePackBtn() {
      packBtn.disabled = files.length === 0 || isPacking;
    }

    // ── Sort control ─────────────────────────────────────────
    document.querySelectorAll('.seg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        sortMode = btn.dataset.sort;
      });
    });

    // ── Pack ──────────────────────────────────────────────────
    packBtn.addEventListener('click', packSprites);

    async function packSprites() {
      if (files.length === 0 || isPacking) return;

      isPacking = true;
      packBtn.textContent = 'Packing…';
      updatePackBtn();

      try {
        const fd = new FormData();
        files.forEach(f => fd.append('images[]', f));
        fd.append('padding', paddingInput.value);
        fd.append('sort', sortMode);

        const res = await fetch('/api/pack', { method: 'POST', body: fd });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${res.status}`);
        }
        const data = await res.json();

        lastResult = data;
        showResult(data);
        exportRow.style.display = 'flex';

      } catch (err) {
        showError(err.message);
      } finally {
        isPacking = false;
        packBtn.textContent = 'Pack Sprites';
        updatePackBtn();
      }
    }

    // ── Render result ─────────────────────────────────────────
    const PALETTE = [
      '#f43f5e','#fb923c','#facc15','#4ade80',
      '#38bdf8','#818cf8','#e879f9','#fb7185',
      '#a78bfa','#34d399','#f97316','#60a5fa',
    ];

    function showResult(data) {
      emptyState.style.display  = 'none';
      errorState.style.display  = 'none';
      resultWrap.style.display  = 'flex';

      const img = new Image();
      img.onload = () => {
        canvas.width  = data.sheet_w;
        canvas.height = data.sheet_h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        data.frames.forEach((f, i) => {
          ctx.strokeStyle = PALETTE[i % PALETTE.length];
          ctx.lineWidth = 1;
          ctx.strokeRect(f.x + 0.5, f.y + 0.5, f.w - 1, f.h - 1);
        });
      };
      img.src = 'data:image/png;base64,' + data.sheet_png;

      const fc = data.frames.length;
      resultsInfo.innerHTML =
        `<span>${data.sheet_w} &times; ${data.sheet_h} px</span>` +
        `&nbsp;&nbsp;&bull;&nbsp;&nbsp;` +
        `<span>${fc} frame${fc !== 1 ? 's' : ''}</span>`;
    }

    function showError(msg) {
      emptyState.style.display  = 'none';
      resultWrap.style.display  = 'none';
      errorState.style.display  = 'flex';
      errorMsg.textContent = 'Error: ' + msg;
    }

    // ── Downloads ─────────────────────────────────────────────
    document.getElementById('dlPng').addEventListener('click', () => {
      if (!lastResult) return;
      const a = document.createElement('a');
      a.href = 'data:image/png;base64,' + lastResult.sheet_png;
      a.download = 'spritesheet.png';
      a.click();
    });

    document.getElementById('dlJson').addEventListener('click', () => {
      if (!lastResult) return;
      const payload = {
        sheet_w: lastResult.sheet_w,
        sheet_h: lastResult.sheet_h,
        frames: lastResult.frames,
      };
      const blob = new Blob(
        [JSON.stringify(payload, null, 2)],
        { type: 'application/json' }
      );
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'spritesheet.json';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
